name: ctoa_test
on:
    workflow_dispatch: 
permissions:
  actions: read # for detecting the Github Actions environment.
  id-token: write # for creating OIDC tokens for signing.
  packages: write # for uploading attestations.
  contents: read
  attestations: write  
jobs:
    build-publish:        
        runs-on: ubuntu-latest
        env:
          DOCKER_REPO: 'pac-ai-generator-docker-local'
          IMAGE_NAME_STRIP: 'skills-jfrog-testing'
          IMAGE_NAME: 'skills-jfrog-testing:${{ github.run_number }}'  
        steps:
            - name: Checkout the repository    
              uses: actions/checkout@v4
              
            - name: Setup JFrog CLI
              id: setup-cli
              uses: jfrog/setup-jfrog-cli@v4.9.1
              env: 
                JF_URL: https://${{ vars.CTOA_JF_URL }}/
                JF_PROJECT: pac-ai-generator
              with:
                  oidc-provider-name: github-carmit-project-1
       
            - name: configure jfrog environment
              run: |
                jf pip-config --repo-resolve=pac-ai-generator-python-virtual    
                
            - name: configure environment
              run: |                      
                python3 -m pip install --upgrade pip setuptools wheel sigstore
                wheel -h
                pip show setuptools
                echo $VIRTUAL_ENV

            - name: Sonar scan
              uses: SonarSource/sonarqube-scan-action@v5
              continue-on-error: true  # Don't fail build on SonarCloud quality gate issues
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              with:
                args: >
                  -Dsonar.projectKey=my-evidence-test-org1_evidence-example
                  -Dsonar.organization=my-evidence-test-org1
                  -Dsonar.projectBaseDir=.
                  -Dsonar.sources=.
                  -Dsonar.inclusions=**/*.go
                  -Dsonar.java.jdkHome=$JAVA_HOME
                  -Dsonar.verbose=true
                
            - name: build project
              run: |                               
                jf pip install -r requirements.txt --module=jfrog-python-example
                python setup.py sdist bdist_wheel
                cd dist && echo "hashes=$(sha256sum * | base64 -w0)" >> $GITHUB_OUTPUT

            - name: publish python package
              run: |
                jf rt u dist/ pac-ai-generator-python-virtual/example-projects/ --module=jfrog-python-example 

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3    
                
            - name: Authenticate Docker
              uses: docker/login-action@v3
              with:
                registry: ${{ vars.CTOA_JF_URL }}
                username: ${{ steps.setup-cli.outputs.oidc-user }} 
                password: ${{ steps.setup-cli.outputs.oidc-token }}
                
            - name: Build Docker image    
              uses: docker/build-push-action@v5
              id: build
              with:
                push: true
                platforms: linux/amd64, linux/arm64
                tags: ${{ vars.CTOA_JF_URL }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}          


            - name: docker scan
              if: false
              run: |  
                 jf docker pull ${{ vars.CTOA_JF_URL }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
                 jf docker scan ${{ vars.CTOA_JF_URL }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}                               

            - name: add docker package to build
              run: |  
                 echo "${{ vars.CTOA_JF_URL }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" > metadata.json
                 jf rt build-docker-create ${{ env.DOCKER_REPO }} --image-file metadata.json 
                 
            - name: publish build info
              run: |
                jf rt bce 
                jf rt bp 
                #jf build-scan  --format sarif --fail=false 

            - name: Create sonar evidence
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                SONAR_REPORT_TASK_FILE: ${{ github.workspace }}/examples/sonar-scan/.scannerwork/report-task.txt
                JFROG_CLI_SIGNING_KEY: ${{ secrets.EVIDENCE_SIGNING_KEY }}
              run: |
                # Attach evidence onto docker package using JFrog CLI                
                jf evd create \
                --integration sonar \
                --package-repo-name  "pac-ai-generator-docker-local"  \
                --package-name "skills-jfrog-testing" \
                --package-version "${{ github.run_number }}" \
                --project "pac-ai-generator" \
                --key-alias "${{ vars.EVIDENCE_PUBLIC_KEY_ALIAS }}" 
                  
            - name: Attest Build Provenance
              uses: actions/attest-build-provenance@v3
              with:
                subject-name: oci://${{ vars.CTOA_JF_URL }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
                subject-digest: ${{ steps.build.outputs.digest }}

